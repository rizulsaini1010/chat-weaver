  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0f1114;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* ✅ Make the whole page look like 67% zoom */
.page-scale {
  zoom: 0.67;                 /* Chrome/Edge/Opera — exactly like browser zoom */
  display: inline-block;      /* keeps centering clean */
}
/* Fallback for browsers without zoom (e.g., Firefox) */
@supports not (zoom: 1) {
  .page-scale {
    transform: scale(0.67);
    transform-origin: top center;
  }
}

.template::before,
.template::after {
  content: "";
  position: absolute;
  left: 0; right: 0;
  height: 150px;
  pointer-events: none;
  z-index: 1;
}
.template::before { top: 0; background: linear-gradient(to bottom, rgba(193,187,240,0.5), rgba(193,187,240,0)); }
.template::after  { bottom: 0; background: linear-gradient(to top, rgba(193,187,240,0.5), rgba(193,187,240,0)); }

.top-bar { margin-top: 30px; text-align: center; position: relative; z-index: 2; }
#rizzLogo { display: block; width: 700px; height: auto; }

.picture-placeholder {
  margin-top: 30px; width: 500px; min-height: 100px; max-height: 700px;
  border-radius: 20px; overflow: hidden; cursor: pointer;
  background-color: rgba(255, 255, 255, 0.12);
  border: 3px dashed rgba(255, 255, 255, 0.45);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-family: sans-serif; font-size: 22px;
  user-select: none; position: relative; transition: height 0.3s ease;
}
#previewImg { display: none; position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }
.picture-placeholder.filled { border: none; background: transparent; color: transparent; }

.ai-rizz { margin-top: 30px; position: relative; z-index: 2; display: flex; justify-content: center; flex-direction: column; align-items: center; }
.ai-rizz img { width: 650px; height: auto; display: block; }

.bubble-wrap { position: relative; width: 600px; margin-top: 16px; margin-bottom: 50px; }

.rizz-bubble {
  background: #EDEDF2;
  border-radius: 22px;
  padding: 14px 26px;
  box-sizing: border-box;
  width: 100%;
  display: flex;
  align-items: center;
  box-shadow: 0 0px 6px rgba(0, 0, 0, 0.08);
  position: relative;
}

/* Input */
#rizzInput {
  width: 100%;
  height: 34px;
  max-height: 160px;
  resize: none;
  overflow: hidden;
  background: transparent;
  border: 0;
  outline: none;
  color: #000;
  font-family: 'TT Fors Trial DemiBold', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  font-size: 29px;
  line-height: 1.4;
  font-weight: 600;
  letter-spacing: -1px;
  caret-color: #000;
  padding-top: 11px;
  padding-bottom: 11px;
  padding-left: 0px;  /* flame space */
  padding-right: 52px; /* copy space */
  box-sizing: border-box;
}

#rizzInput::placeholder { color: rgba(0,0,0,0.45); }

/* Reset button below template */
.reset-btn {
  margin-top: 20px;
  padding: 10px 18px;
  font-size: 15px;
  border: none;
  border-radius: 10px;
  background: #EDEDF2;
  color: #000;
  font-family: 'TT Fors Trial DemiBold', sans-serif;
  cursor: pointer;
  box-shadow: 0 0px 5px rgba(255,255,255,0.2);
  transition: all 0.2s ease-in-out;
}
.reset-btn:hover { background: #ffffff; transform: scale(1.04); }
  
.screenshot-tip { font-size: 12px; color: #bbb; margin-top: 6px; text-align: center; }
#shotBtn { margin-left: 8px; }

@media (max-width: 768px) {
  body {
    transform: scale(0.6);
    transform-origin: top center;
  }
}



#placeholder {
  position: relative;
  overflow: hidden;
}

#placeholder::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 35%;
  background: linear-gradient(to bottom, rgba(224,205,235,0.4) 0%, rgba(224,205,235,0) 100%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}

#placeholder.filled::after {
  opacity: 1;
}

<button class="reset-btn" id="resetBtn" style=" padding:10px 18px;font-size:16px; padding:14px 28px;font-size:20px;font-family:'Poppins',sans-serif;font-weight:600;" type="button">Reset</button><button class="reset-btn" id="shotBtn" style=" padding:10px 18px;font-size:16px; padding:14px 28px;font-size:20px;font-family:'Poppins',sans-serif;font-weight:600;" type="button">Screenshot</button><span id="screenshotHelperText" style="margin-left:12px; color:rgba(255,255,255,0.85); font-size:1.2em; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; vertical-align:-1px; white-space:nowrap;"> Upload a picture before you click Screenshot.</span>

<script>
    const placeholder = document.getElementById('placeholder');
    const fileInput   = document.getElementById('fileInput');
    const previewImg  = document.getElementById('previewImg');
    const resetBtn    = document.getElementById('resetBtn');
    const template    = document.getElementById('template');
    const rizzInput   = document.getElementById('rizzInput');

    placeholder.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        previewImg.style.display = 'block';
        placeholder.classList.add('filled');
        resetBtn.style.display = 'inline-block';

        const tempImg = new Image();
        tempImg.onload = () => {
          const ratio = tempImg.height / tempImg.width;
          const phWidth = placeholder.clientWidth;
          let newHeight = phWidth * ratio;
          const maxHeight = 700;
          if (newHeight > maxHeight) newHeight = maxHeight;
          placeholder.style.height = `${newHeight}px`;
        };
        tempImg.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    resetBtn.addEventListener('click', () => {
      fileInput.value = '';
      previewImg.src = '';
      previewImg.style.display = 'none';
      placeholder.classList.remove('filled');
      placeholder.style.height = '';
      rizzInput.value = '';
      autoResize();
    });

    function autoResize() {
      rizzInput.style.height = '34px';
      const newH = Math.min(rizzInput.scrollHeight, 160);
      rizzInput.style.height = newH + 'px';
    }

    ['input','change'].forEach(e => rizzInput.addEventListener(e, autoResize));
    window.addEventListener('load', autoResize);
  </script>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
<script>
function nextRizzFilename() {
  try {
    const key = 'rizzTemplateCounter';
    const n = parseInt(localStorage.getItem(key) || '0', 10) + 1;
    localStorage.setItem(key, String(n));
    return `RIZZ-Template (${n}).png`;
  } catch {
    return 'RIZZ-Template (1).png';
  }
}


(function(){
  const shotBtn = document.getElementById('shotBtn');
  const template = document.getElementById('template');

  if (!shotBtn || !template) return;

  function downloadDataUrl(filename, dataUrl){
    const a = document.createElement('a');
    a.download = filename;
    a.href = dataUrl;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  async function downscaleImage(dataUrl, scale = 0.5) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/png'));
      };
      img.src = dataUrl;
    });
  }

  shotBtn.addEventListener('click', async () => {
    if (typeof htmlToImage === 'undefined') {
      alert('Please upload a picture before taking a screenshot.');
      return;
    }
    const prevText = shotBtn.textContent;
    shotBtn.disabled = true;
    shotBtn.textContent = 'Capturing…';

    try {
      const dataUrlHighRes = await htmlToImage.toPng(template, {
        cacheBust: true,
        pixelRatio: 2,
        style: { transform: 'none', zoom: 1 }
      });

      const smoothDataUrl = await downscaleImage(dataUrlHighRes, 0.5);
      downloadDataUrl('rizz-template.png', smoothDataUrl);
    } catch (err) {
      console.error(err);
      alert('Please upload a picture before taking a screenshot.');
    } finally {
      shotBtn.disabled = false;
      shotBtn.textContent = prevText;
    }
  });
})();
</script>
